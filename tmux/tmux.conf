# tmux config — prefix is Ctrl-a (easier than default Ctrl-b)
# Linked to ~/.tmux.conf by the zsh module.
# Reload: prefix + r   |  Cheatsheet: thelp / sc tmux
# Edit: tmuxconfig

# ── Prefix ──────────────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── Basics ──────────────────────────────────────────────────────────────────
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 100000
set -g set-clipboard on
set -g status-interval 5
set -g default-terminal "screen-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g escape-time 0
set -g focus-events on
setw -g mode-keys vi

# ── Reload ──────────────────────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# ── Splits (current path) ───────────────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
unbind '"'
unbind %

# ── Pane navigation (vim-style) ─────────────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Pane resize ─────────────────────────────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Windows ─────────────────────────────────────────────────────────────────
bind -r n next-window
bind -r p previous-window
bind Tab last-window

# ── Copy mode (vi) + macOS clipboard ────────────────────────────────────────
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

# ── Session / popup helpers ─────────────────────────────────────────────────
bind f command-prompt -p "find window:" "find-window -N '%%'"
bind C-p display-popup -E -w 80% -h 80% "zsh"

# ── Status bar (calm, matches Starship vibe) ────────────────────────────────
set -g status-position bottom
set -g status-style "bg=default,fg=colour245"
set -g status-left-length 40
set -g status-right-length 80
set -g status-left "#[fg=colour39,bold]#S#[default] "
set -g status-right "#[fg=colour245]%Y-%m-%d %H:%M "
setw -g window-status-format " #I:#W "
setw -g window-status-current-format "#[fg=colour39,bold] #I:#W*#[default]"
setw -g window-status-current-style "fg=colour39"
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour39"
set -g message-style "fg=colour15,bg=colour238"
