# Helix — terminal editor (replaces default vim for EDITOR/VISUAL)
# Docs: https://docs.helix-editor.com/
# Linked to ~/.config/helix/config.toml by the zsh module.
# Edit: hxconfig   |  Tutorial: hx --tutor

theme = "dark_plus"

[editor]
line-number = "relative"
mouse = true
cursorline = true
bufferline = "multiple"
color-modes = true
auto-save = false
auto-format = true
completion-trigger-len = 2
idle-timeout = 200
rulers = [100]
true-color = true
undercurl = true

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden = false
git-ignore = true

[editor.lsp]
display-messages = true
display-inlay-hints = true

[editor.statusline]
left = ["mode", "spinner", "file-name", "read-only-indicator", "file-modification-indicator"]
center = ["version-control"]
right = ["diagnostics", "selections", "position", "file-encoding", "file-type"]
mode.normal = "NORMAL"
mode.insert = "INSERT"
mode.select = "SELECT"

[editor.whitespace]
render = "none"

[editor.indent-guides]
render = true
character = "│"

[editor.soft-wrap]
enable = true
max-wrap = 100

[keys.normal]
C-s = ":write"
C-q = ":quit"

[keys.insert]
C-s = ["normal_mode", ":write"]
